syntax = "proto2";
package th;

import "enum.proto";
import "protocol.proto";

message ODLoginReq
{
	optional EMessageID			MessageID			= 99	[default = OD_LOGIN_REQ];

	required string				PID					= 1;
	required int64				LogKey				= 2;
	required MDateTime			UpdateDate			= 3;
	required bool				IsReconnect			= 4;
	required int32				ServerID			= 5;
	required int32				LanguageID			= 6;
	optional string				AppVersion			= 7;
	optional string				IP					= 10;
}

message DOLoginAck
{
	optional EMessageID			MessageID				= 99	[default = DO_LOGIN_ACK];

	required string				PID						= 1;
	required int64				AccountID				= 2;
	required int32				GameDbID				= 3;
	required string				PlayerName				= 4;
	required bool				IsReconnect				= 5;
	required int32				ChannelID				= 6;
	required int32				FreeNicknameChangeCount = 7;
	required bool				IsNewAccount			= 8;
	required MDateTime			UpdateTime				= 9;
	required int32				LanguageID				= 10;
	required int32				TotalPlayTime			= 11;
	required bool				Authenticated			= 12;
	optional string				IP						= 14;
}

// outgame -> db: 게임 세션 종료 저장 요청. SessionID 는 PacketMessage 가 운반.
message ODExitGameSessionReq
{
	optional EMessageID			MessageID			= 99	[default = OD_EXIT_GAME_SESSION_REQ];

	required int64				AccountID			= 1;
	required string				PID					= 2;
}

// db -> outgame: 세션 종료 저장 완료 ack.
message DOExitGameSessionAck
{
	optional EMessageID			MessageID			= 99	[default = DO_EXIT_GAME_SESSION_ACK];
}

// outgame -> ingame: 세션 종료 → 캐릭터 제거 요청. SessionID 는 PacketMessage 가 운반하므로 body 없음.
message OIExitGameSessionReq
{
	optional EMessageID			MessageID			= 99	[default = OI_EXIT_GAME_SESSION_REQ];
}

// outgame -> ingame: 필드(룸) 진입 요청. SessionID 는 PacketMessage 가 운반하므로 body 엔 RoomID 만.
message OIEnterReq
{
	optional EMessageID			MessageID			= 99	[default = OI_ENTER_REQ];

	required int64				RoomID				= 1;
}

// outgame -> ingame: 필드(룸) 이탈 요청. SessionID 는 PacketMessage 가 운반하므로 body 없음.
message OILeaveReq
{
	optional EMessageID			MessageID			= 99	[default = OI_LEAVE_REQ];
}

// ingame -> outgame: 입장 확정 ack. OutGame Player 가 받아 State 를 InField 로 확정한다.
message IOEnterAck
{
	optional EMessageID			MessageID			= 99	[default = IO_ENTER_ACK];

	required int64				RoomID				= 1;
}
