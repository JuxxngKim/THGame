syntax = "proto2";
package th;

// emum ///////////////////////////////////////////////////////////////////////////
enum EProtocolVersion
{
	RE_PROTOCOL_VERSION	= 4;
}

enum EMessageID
{
	//------------------공통
	NET_DISCONNECT								= 101;
	NET_ALIVE_REQ								= 102;
	NET_ALIVE_ACK								= 103;
	
	///clent <-> outgame
	CO_CLIENT_OUTGAME_BEGIN						= 10000;

	CO_LOGIN_REQ								= 10002;
	OC_LOGIN_ACK								= 10003;
	CO_GET_PLAYER_REQ							= 10199;
	CO_ENTER_REQ								= 10200;

	CO_CLIENT_OUTGAME_END						= 19999;

	///outgame <-> db
	OD_OUTGAME_DBSERVICE_BEGIN					= 20100;

	OD_LOGIN_REQ								= 20101;
	DO_LOGIN_ACK								= 20102;
	OD_EXIT_GAME_SESSION_REQ					= 20103;
	DO_EXIT_GAME_SESSION_ACK					= 20104;

	OD_OUTGAME_DBSERVICE_END					= 49999;

	///outgame <-> ingame (cross-domain, 서버 내부 전용)
	OI_OUTGAME_INGAME_BEGIN						= 50000;

	OI_ENTER_REQ								= 50001;
	OI_LEAVE_REQ								= 50002;
	OI_EXIT_GAME_SESSION_REQ					= 50003;

	IO_ENTER_ACK								= 50101;

	OI_OUTGAME_INGAME_END						= 59999;

	///ingame -> client (클라 대면)
	IC_INGAME_CLIENT_BEGIN						= 60000;

	IC_ENTER_NOTI								= 60001;

	IC_INGAME_CLIENT_END						= 69999;
}

enum EErrorMsg
{
	E_SUCCESS = 0;		// 성공
	E_UNKNOWN = 1;

	//공통 에러
	E_INVALID_DATA = 100; // 잘못된 데이터입니다.
}